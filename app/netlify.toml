[build]
  command = "npm run build"
  publish = "out"

# Immutable assets (content-hashed by Next.js)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers on all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://cateredfit-images.s3.amazonaws.com data:; connect-src 'self' https://phoenix.cateredfit.com; font-src 'self'; frame-ancestors 'none'"
